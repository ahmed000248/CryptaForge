{% extends "base.html" %}

{% block title %}Register - CipherForge{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex p-3 bg-primary bg-opacity-10 rounded-circle text-primary mb-3">
                        <i class="bi bi-person-plus-fill fs-2"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Create an Account</h3>
                    <p class="text-muted">Register to start saving cipher logs and custom ciphers</p>
                </div>
                
                <form action="{{ url_for('register') }}" method="POST">
                    <div class="mb-3">
                        <label for="fullname" class="form-label fw-semibold">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-card-text text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="fullname" name="fullname" placeholder="Enter full name" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter username" required>
                        </div>
                        <div class="form-text">Choose a unique username for login.</div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="Enter email address" required>
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Password" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-shield-check text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" id="confirm_password" name="confirm_password" placeholder="Confirm" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg btn-rounded">Register Account</button>
                    </div>
                    
                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-semibold text-decoration-none">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
