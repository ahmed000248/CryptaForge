{% extends "base.html" %}

{% block title %}Login - CipherForge{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex p-3 bg-primary bg-opacity-10 rounded-circle text-primary mb-3">
                        <i class="bi bi-shield-lock-fill fs-2"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Welcome Back</h3>
                    <p class="text-muted">Sign in to access the cryptography lab</p>
                </div>
                
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg btn-rounded">Login</button>
                    </div>
                    
                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="text-primary fw-semibold text-decoration-none">Register here</a></p>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Demo Credentials Helper -->
        <div class="card mt-3 bg-light border-0">
            <div class="card-body text-center p-3">
                <span class="badge bg-dark mb-1">Demo Admin Credentials</span>
                <p class="mb-0 small text-muted">Username: <strong>admin</strong> | Password: <strong>admin123</strong></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
